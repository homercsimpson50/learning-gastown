# Gas Town — Containerized Setup
#
# Usage:
#   GIT_USER="Your Name" GIT_EMAIL="you@example.com" docker compose up -d
#   docker compose exec gastown gt mayor attach
#
# Prerequisites:
#   - Build the gastown image first:
#     cd <gastown-src> && docker build -t gastown:latest -f Dockerfile .
#
# Rig repos: add bind-mounts under the gastown service's volumes section.
# Each rig maps to /gt/rigs/<name>/repo inside the container.
#
# Monorepo: mount once, then `gt rig add` each subproject pointing to
# the subdirectory. See the guide for details.

name: gastown

services:
  gastown:
    image: gastown:latest
    container_name: gastown
    hostname: gastown

    stdin_open: true
    tty: true

    # Security: drop all capabilities, add back only what's needed
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID

    # Resource limits — prevent fork bombs and OOM
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
          pids: 512

    environment:
      IS_SANDBOX: 1
      GIT_USER: ${GIT_USER:-TestUser}
      GIT_EMAIL: ${GIT_EMAIL:-test@example.com}
      # Telemetry: stream agent logs to VictoriaLogs sidecar
      GT_OTEL_LOGS_URL: http://victoria-logs:9428/insert/opentelemetry/v1/logs
      GT_LOG_AGENT_OUTPUT: "true"
      # Suppress metrics upload error (no VictoriaMetrics in this stack)
      GT_OTEL_METRICS_URL: ""

    volumes:
      # Workspace root where GT is initialized
      - gt-workspace:/gt

      # Dolt data on a Docker volume (not macOS bind mount)
      # to avoid journal corruption from VirtioFS fsync semantics.
      - dolt-data:/gt/.dolt-data

      # --- Rig repos ---
      # Nothing mounted by default. Configure mounts in ~/.gtc.conf:
      #   GTC_MOUNTS="/path/to/repo1 /path/to/repo2"
      # Then run: gtc up
      # Or use: gtc mount ~/code/myproject (adds to config + restarts)

      # Host Claude settings (read-only staging — entrypoint syncs into writable home)
      - ~/.claude:/home/agent/.claude-host:ro

      # Host gh CLI credentials (read-only — entrypoint syncs for git push)
      - ~/.config/gh:/home/agent/.config/gh-host:ro

      # Writable Claude home — persists credentials, sessions, and history
      - claude-data:/home/agent/.claude

      # NOTE: Do NOT mount ~/.gitconfig — the entrypoint writes git config
      # from GIT_USER/GIT_EMAIL env vars. A read-only mount blocks that.

    ports:
      - "${DASHBOARD_PORT:-8081}:8080"

    networks:
      - gt-net

    depends_on:
      victoria-logs:
        condition: service_started

    restart: unless-stopped

  # --- Observability: VictoriaLogs ---
  # Receives OTLP logs from GT, queryable via built-in VMUI.
  # Open http://localhost:9428/select/vmui in your browser.
  victoria-logs:
    image: victoriametrics/victoria-logs:latest
    container_name: gt-victoria-logs
    hostname: victoria-logs
    volumes:
      - vlogs-data:/vlogs
    command:
      - "-storageDataPath=/vlogs"
      - "-retentionPeriod=30d"
    ports:
      - "${VLOGS_PORT:-9428}:9428"
    networks:
      - gt-net
    restart: unless-stopped

  # --- Secrets Gateway ---
  # Proxies GitHub/Jira/Slack API calls so agents never see raw tokens.
  # Only reachable inside gt-net (not port-mapped to host).
  gateway:
    build:
      context: ./gateway-sidecar
    container_name: gt-gateway
    hostname: gateway
    volumes:
      - ${SECRETS_FILE:-./secrets.env.example}:/secrets/secrets.env:ro
    environment:
      JIRA_ALLOWED_PROJECTS: ${JIRA_ALLOWED_PROJECTS:-}
      GITHUB_ALLOWED_REPOS: ${GITHUB_ALLOWED_REPOS:-}
      GATEWAY_TOKEN: ${GATEWAY_TOKEN:-}
    networks:
      - gt-net
    restart: unless-stopped

networks:
  gt-net:
    driver: bridge

volumes:
  gt-workspace:
  dolt-data:
  vlogs-data:
  claude-data:
